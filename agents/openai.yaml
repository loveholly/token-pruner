interface:
  display_name: "Token Pruner"
  short_description: "Prune structured payloads and noisy CLI output before they hit the model context"
  default_prompt: "Verify the bundled toolchain first, then shrink a payload for LLM use by routing CLI noise through RTK when possible, pruning structured data with jq or qsv, normalizing command output with jc when needed, and choosing compact JSON or TOON based on the payload shape."
